# Render.com Blueprint for Cro-Mag Rally Signaling Server
# https://render.com/docs/blueprint-spec
#
# NOTE: Render web services expect HTTP. This TCP server works but health checks
# will fail. Use "Suspend Health Check" in dashboard or use paid tier with
# background worker. Alternative: use Railway.app or Fly.io for better TCP support.

services:
  - type: web
    name: cromag-signaling
    runtime: docker
    dockerfilePath: ./signaling-server/Dockerfile
    dockerContext: ./signaling-server
    region: frankfurt  # oregon, ohio, virginia, frankfurt, singapore
    plan: free
    autoDeploy: true
