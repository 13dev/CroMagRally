# fly.toml app configuration file generated for cromag-yojimbo on 2026-05-20T19:51:28+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cromag-yojimbo'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '40000'

[[services]]
  protocol = 'udp'
  internal_port = 40000
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 40000

[[vm]]
  memory = '1gb'
  cpus = 2
  memory_mb = 1024
