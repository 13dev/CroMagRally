# fly.toml app configuration file generated for cromag-signaling on 2026-05-20T15:47:17+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cromag-signaling'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '27015'

[[services]]
  protocol = 'tcp'
  internal_port = 27015
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 27015

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  memory = '1gb'
  cpus = 1

[deploy]
  strategy = "immediate"
