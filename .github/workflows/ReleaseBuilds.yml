name: Make Release Builds

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  GNS_VERSION: v1.5.1

jobs:
  build-linux-appimage:
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: x86_64, os: ubuntu-22.04, arch: x86_64 }
          - { name: aarch64, os: ubuntu-22.04-arm, arch: aarch64 }
    steps:
      - uses: actions/checkout@v4
        with: {submodules: 'recursive'}

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            ninja-build python3-pip
            libasound2-dev libpulse-dev libaudio-dev libjack-dev libsndio-dev
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev
            libxi-dev libxss-dev libxkbcommon-dev libdrm-dev libgbm-dev
            libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev libdbus-1-dev
            libibus-1.0-dev libudev-dev fcitx-libs-dev libpipewire-0.3-dev
            libwayland-dev libdecor-0-dev liburing-dev desktop-file-utils
            libspdlog-dev libssl-dev libprotobuf-dev protobuf-compiler
          version: 1.0

      - name: Install Meson
        run: pip install meson

      - name: Build SDL3 from source
        run: |
          git clone --depth 1 --branch release-3.2.14 https://github.com/libsdl-org/SDL.git
          cd SDL
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DSDL_SHARED=ON -DSDL_STATIC=OFF
          cmake --build build --parallel
          sudo cmake --install build
          sudo ldconfig

      - name: Build GNS from source
        run: |
          git clone --depth 1 --branch ${{ env.GNS_VERSION }} https://github.com/ValveSoftware/GameNetworkingSockets.git
          cd GameNetworkingSockets
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_EXAMPLES=OFF -DBUILD_TESTS=OFF
          cmake --build build --parallel
          sudo cmake --install build
          sudo ldconfig

      - name: Configure
        run: meson setup build-release -Dbuildtype=release

      - name: Build
        run: meson compile -C build-release

      - name: Package
        run: |
          VERSION=$(grep "version:" meson.build | head -1 | sed "s/.*'\([^']*\)'.*/\1/")
          PKG="CroMagRally-${VERSION}-Linux-${{ matrix.platform.arch }}"
          mkdir -p "dist/$PKG"
          cp build-release/CroMagRally "dist/$PKG/"
          cp -r Data "dist/$PKG/"
          # Copy shared libraries
          mkdir -p "dist/$PKG/lib"
          cp /usr/local/lib/libSDL3.so* "dist/$PKG/lib/" || true
          cp /usr/local/lib/libGameNetworkingSockets.so* "dist/$PKG/lib/" || true
          # Create wrapper script
          cat > "dist/$PKG/run.sh" << 'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          export LD_LIBRARY_PATH="$DIR/lib:$LD_LIBRARY_PATH"
          exec "$DIR/CroMagRally" "$@"
          EOF
          chmod +x "dist/$PKG/run.sh"
          cd dist && tar -czvf "${PKG}.tar.gz" "$PKG"
          echo "ARTIFACT_NAME=${PKG}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/*.tar.gz
          compression-level: 0

  build-windows:
    runs-on: ubuntu-latest
    container: fedora:latest
    timeout-minutes: 60
    steps:
      - name: Install MinGW toolchain
        run: |
          dnf install -y \
            mingw64-gcc-c++ mingw64-cmake cmake \
            mingw64-openssl mingw64-protobuf \
            mingw64-winpthreads-static mingw64-SDL3 \
            meson ninja-build git zip python3

      - uses: actions/checkout@v4
        with: {submodules: 'recursive'}

      - name: Build spdlog for MinGW
        run: |
          git clone --depth 1 --branch v1.15.3 https://github.com/gabime/spdlog.git
          cd spdlog
          mingw64-cmake -B build -DCMAKE_BUILD_TYPE=Release -DSPDLOG_BUILD_SHARED=OFF
          cmake --build build --parallel
          cmake --install build --prefix /usr/x86_64-w64-mingw32/sys-root/mingw

      - name: Build GNS for MinGW
        run: |
          # Fix case-sensitivity issue: GNS links against Iphlpapi but MinGW has iphlpapi
          MINGW_LIB=/usr/x86_64-w64-mingw32/sys-root/mingw/lib
          ln -sf libiphlpapi.a "$MINGW_LIB/libIphlpapi.a" 2>/dev/null || true

          git clone --depth 1 --branch v1.5.1 https://github.com/ValveSoftware/GameNetworkingSockets.git
          cd GameNetworkingSockets
          mingw64-cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_EXAMPLES=OFF -DBUILD_TESTS=OFF
          cmake --build build --parallel
          cmake --install build --prefix /usr/x86_64-w64-mingw32/sys-root/mingw

      - name: Configure with Meson
        run: |
          cat > cross-mingw64.txt << 'EOF'
          [binaries]
          c = 'x86_64-w64-mingw32-gcc'
          cpp = 'x86_64-w64-mingw32-g++'
          ar = 'x86_64-w64-mingw32-ar'
          strip = 'x86_64-w64-mingw32-strip'
          windres = 'x86_64-w64-mingw32-windres'
          pkgconfig = 'x86_64-w64-mingw32-pkg-config'

          [host_machine]
          system = 'windows'
          cpu_family = 'x86_64'
          cpu = 'x86_64'
          endian = 'little'

          [properties]
          sys_root = '/usr/x86_64-w64-mingw32/sys-root/mingw'
          pkg_config_libdir = '/usr/x86_64-w64-mingw32/sys-root/mingw/lib/pkgconfig'

          [built-in options]
          cpp_args = ['-I/usr/x86_64-w64-mingw32/sys-root/mingw/include']
          c_args = ['-I/usr/x86_64-w64-mingw32/sys-root/mingw/include']
          EOF
          meson setup build-win64 --cross-file cross-mingw64.txt -Dbuildtype=release

      - name: Build
        run: meson compile -C build-win64

      - name: Package
        run: |
          VERSION=$(grep "version:" meson.build | head -1 | sed "s/.*'\([^']*\)'.*/\1/")
          PKG="CroMagRally-${VERSION}-Windows-x86_64"
          mkdir -p "dist/$PKG"
          cp build-win64/CroMagRally.exe "dist/$PKG/"
          cp build-win64/*.dll "dist/$PKG/" 2>/dev/null || true
          # Copy MinGW runtime DLLs
          cp /usr/x86_64-w64-mingw32/sys-root/mingw/bin/*.dll "dist/$PKG/" 2>/dev/null || true
          cp -r Data "dist/$PKG/"
          cd dist && zip -r "${PKG}.zip" "$PKG"
          echo "ARTIFACT_NAME=${PKG}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/*.zip
          compression-level: 0

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with: {submodules: 'recursive'}

      - name: Install dependencies
        run: |
          brew install meson ninja sdl3 spdlog openssl protobuf

      - name: Build GNS from source
        run: |
          git clone --depth 1 --branch v1.5.1 https://github.com/ValveSoftware/GameNetworkingSockets.git
          cd GameNetworkingSockets
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_EXAMPLES=OFF -DBUILD_TESTS=OFF
          cmake --build build --parallel
          sudo cmake --install build

      - name: Configure
        run: meson setup build-release -Dbuildtype=release

      - name: Build
        run: meson compile -C build-release

      - name: Package
        run: |
          VERSION=$(grep "version:" meson.build | head -1 | sed "s/.*'\([^']*\)'.*/\1/")
          PKG="CroMagRally-${VERSION}-macOS-arm64"
          mkdir -p "dist/$PKG"
          cp build-release/CroMagRally "dist/$PKG/"
          cp -r Data "dist/$PKG/"
          cd dist && zip -r "${PKG}.zip" "$PKG"
          echo "ARTIFACT_NAME=${PKG}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/*.zip
          compression-level: 0

  release:
    needs: [build-linux-appimage, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
