name: Make Release Builds

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  GNS_VERSION: v1.5.1

jobs:
  build-linux-appimage:
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: x86_64, os: ubuntu-22.04, arch: x86_64 }
          - { name: aarch64, os: ubuntu-22.04-arm, arch: aarch64 }
    steps:
      - uses: actions/checkout@v4
        with: {submodules: 'recursive'}

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            ninja-build python3-pip
            libasound2-dev libpulse-dev libaudio-dev libjack-dev libsndio-dev
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev
            libxi-dev libxss-dev libxkbcommon-dev libdrm-dev libgbm-dev
            libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev libdbus-1-dev
            libibus-1.0-dev libudev-dev fcitx-libs-dev libpipewire-0.3-dev
            libwayland-dev libdecor-0-dev liburing-dev desktop-file-utils
            libspdlog-dev libssl-dev libprotobuf-dev protobuf-compiler
          version: 1.0

      - name: Install Meson
        run: pip install meson

      - name: Build SDL3 from source
        run: |
          git clone --depth 1 --branch release-3.2.14 https://github.com/libsdl-org/SDL.git
          cd SDL
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DSDL_SHARED=ON -DSDL_STATIC=OFF
          cmake --build build --parallel
          sudo cmake --install build
          sudo ldconfig

      - name: Build GNS from source
        run: |
          git clone --depth 1 --branch ${{ env.GNS_VERSION }} https://github.com/ValveSoftware/GameNetworkingSockets.git
          cd GameNetworkingSockets
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_EXAMPLES=OFF -DBUILD_TESTS=OFF
          cmake --build build --parallel
          sudo cmake --install build
          sudo ldconfig

      - name: Configure
        run: meson setup build-release -Dbuildtype=release

      - name: Build
        run: meson compile -C build-release

      - name: Package as AppImage
        run: |
          VERSION=$(grep "version:" meson.build | head -1 | sed "s/.*'\([^']*\)'.*/\1/")
          ARCH=${{ matrix.platform.arch }}
          APPDIR="CroMagRally.AppDir"

          # Create AppDir structure
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/lib" "$APPDIR/usr/share/metainfo" "$APPDIR/usr/share/applications"

          # Copy binary and data
          cp build-release/CroMagRally "$APPDIR/usr/bin/"
          cp -r Data "$APPDIR/"

          # Copy packaging files
          cp packaging/io.jor.cromagrally.desktop "$APPDIR/"
          cp packaging/io.jor.cromagrally.png "$APPDIR/"
          cp packaging/io.jor.cromagrally.appdata.xml "$APPDIR/usr/share/metainfo/"
          cp packaging/io.jor.cromagrally.desktop "$APPDIR/usr/share/applications/"
          cp packaging/AppRun "$APPDIR/"
          chmod +x "$APPDIR/AppRun"

          # Copy shared libraries
          cp /usr/local/lib/libSDL3.so* "$APPDIR/usr/lib/" || true
          cp /usr/local/lib/libGameNetworkingSockets.so* "$APPDIR/usr/lib/" || true

          # Download appimagetool
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${ARCH}.AppImage" -O appimagetool
          chmod +x appimagetool

          # Create AppImage (use --appimage-extract-and-run for FUSE-less environments)
          ARTIFACT="CroMagRally-${VERSION}-Linux-${ARCH}.AppImage"
          ./appimagetool --appimage-extract-and-run "$APPDIR" "$ARTIFACT"

          mkdir -p dist
          mv "$ARTIFACT" dist/
          echo "ARTIFACT_NAME=CroMagRally-${VERSION}-Linux-${ARCH}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/*.AppImage
          compression-level: 0

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with: {submodules: 'recursive'}

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: |
          pip install conan meson ninja

      - name: Setup Conan
        run: |
          conan profile detect --force

      - name: Install dependencies with Conan
        run: |
          conan install . --output-folder=build-release --build=missing -s build_type=Release -s compiler.cppstd=20 --deployer=full_deploy

      - name: Configure with Meson
        run: |
          meson setup build-release --native-file build-release/conan_meson_native.ini -Dbuildtype=release

      - name: Build
        run: meson compile -C build-release

      - name: Package
        shell: bash
        run: |
          VERSION=$(grep "version:" meson.build | head -1 | sed "s/.*'\([^']*\)'.*/\1/")
          PKG="CroMagRally-${VERSION}-Windows-x86_64"
          mkdir -p "dist/$PKG"
          cp build-release/CroMagRally.exe "dist/$PKG/"
          cp -r Data "dist/$PKG/"
          # Copy DLLs from Conan full_deploy output
          find build-release/full_deploy -name "*.dll" -exec cp {} "dist/$PKG/" \; 2>/dev/null || true
          cd dist && 7z a "${PKG}.zip" "$PKG"
          echo "ARTIFACT_NAME=${PKG}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/*.zip
          compression-level: 0

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with: {submodules: 'recursive'}

      - name: Install dependencies
        run: |
          brew install meson ninja sdl3 spdlog openssl protobuf

      - name: Build GNS from source
        run: |
          git clone --depth 1 --branch v1.5.1 https://github.com/ValveSoftware/GameNetworkingSockets.git
          cd GameNetworkingSockets
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_EXAMPLES=OFF -DBUILD_TESTS=OFF
          cmake --build build --parallel
          sudo cmake --install build

      - name: Configure
        run: meson setup build-release -Dbuildtype=release

      - name: Build
        run: meson compile -C build-release

      - name: Package
        run: |
          VERSION=$(grep "version:" meson.build | head -1 | sed "s/.*'\([^']*\)'.*/\1/")
          PKG="CroMagRally-${VERSION}-macOS-arm64"
          mkdir -p "dist/$PKG"
          cp build-release/CroMagRally "dist/$PKG/"
          cp -r Data "dist/$PKG/"
          cd dist && zip -r "${PKG}.zip" "$PKG"
          echo "ARTIFACT_NAME=${PKG}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/*.zip
          compression-level: 0

  release:
    needs: [build-linux-appimage, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
