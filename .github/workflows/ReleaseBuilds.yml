name: Make Release Builds

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  GNS_VERSION: v1.5.1
  CACHE_VERSION: v4  # Must match PrebuildDeps.yml

jobs:
  build-linux-appimage:
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        platform:  # Use oldest available Ubuntu for maximum glibc compatibility
          - { name: x86_64, os: ubuntu-22.04, cache-platform: linux-x64 }
          - { name: aarch64, os: ubuntu-22.04-arm, cache-platform: linux-arm64 }
    steps:
      - uses: actions/checkout@v4
        with: {submodules: 'recursive'}

      - name: Restore prebuilt GNS from cache
        uses: actions/cache/restore@v4
        id: gns-cache
        with:
          path: gns-prebuilt
          key: gns-prebuilt-${{ matrix.platform.cache-platform }}-${{ env.GNS_VERSION }}-${{ env.CACHE_VERSION }}

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            libasound2-dev libpulse-dev libaudio-dev libjack-dev libsndio-dev
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev
            libxi-dev libxss-dev libxkbcommon-dev libdrm-dev libgbm-dev
            libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev libdbus-1-dev
            libibus-1.0-dev libudev-dev fcitx-libs-dev libpipewire-0.3-dev
            libwayland-dev libdecor-0-dev liburing-dev desktop-file-utils
          version: 1.0

      - name: Verify prebuilt GNS cache
        if: steps.gns-cache.outputs.cache-hit != 'true'
        run: |
          echo "::error::Prebuilt GNS cache miss! Run PrebuildDeps.yml workflow manually."
          exit 1

      - name: Set up prebuilt GNS
        run: |
          echo "Using prebuilt GNS from cache"
          echo "CMAKE_PREFIX_PATH=${{ github.workspace }}/gns-prebuilt" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=${{ github.workspace }}/gns-prebuilt/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - run: echo "ARTIFACT_NAME=$(python3 build.py --print-artifact-name)" >> $GITHUB_ENV
      - run: python3 build.py --dependencies
      - run: python3 build.py --configure -DCMAKE_PREFIX_PATH="${{ github.workspace }}/gns-prebuilt"
      - run: python3 build.py --build
      - run: python3 build.py --package
      - uses: actions/upload-artifact@v4
        with:
          name: ${{env.ARTIFACT_NAME}}
          path: dist/
          compression-level: 0

  build-windows-mingw:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with: {submodules: 'recursive'}

      - name: Restore prebuilt MinGW GNS from cache
        uses: actions/cache/restore@v4
        id: gns-cache
        with:
          path: gns-prebuilt
          key: gns-prebuilt-mingw-x64-${{ env.GNS_VERSION }}-${{ env.CACHE_VERSION }}

      - name: Install MinGW toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 ninja-build protobuf-compiler

      - name: Verify prebuilt GNS cache
        if: steps.gns-cache.outputs.cache-hit != 'true'
        run: |
          echo "::error::Prebuilt MinGW GNS cache miss! Run PrebuildDeps.yml workflow manually."
          exit 1

      - name: Set up prebuilt GNS
        run: |
          echo "Using prebuilt MinGW GNS from cache"
          echo "MINGW_VCPKG_ROOT=${{ github.workspace }}/gns-prebuilt" >> $GITHUB_ENV

      - name: Get artifact name
        run: |
          # Override artifact name for Windows
          VERSION=$(grep 'set(GAME_VERSION' CMakeLists.txt | sed 's/.*"\(.*\)".*/\1/')
          echo "ARTIFACT_NAME=CroMagRally-${VERSION}-Windows-x86_64" >> $GITHUB_ENV

      - name: Configure with MinGW
        run: |
          cmake --preset mingw-release \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/gns-prebuilt"

      - name: Build
        run: cmake --build --preset mingw-release --parallel

      - name: Package Windows build
        run: |
          mkdir -p dist
          BUILD_DIR="out/mingw-release"

          # Create package directory
          VERSION=$(grep 'set(GAME_VERSION' CMakeLists.txt | sed 's/.*"\(.*\)".*/\1/')
          PKG_DIR="dist/CroMagRally-${VERSION}-Windows-x86_64"
          mkdir -p "$PKG_DIR"

          # Copy executable and all DLLs (auto-bundled by CMake post-build step)
          cp "$BUILD_DIR/CroMagRally.exe" "$PKG_DIR/"
          cp "$BUILD_DIR"/*.dll "$PKG_DIR/" 2>/dev/null || true

          # Copy Data folder and ReadMe
          cp -r "$BUILD_DIR/Data" "$PKG_DIR/"
          cp "$BUILD_DIR/ReadMe.txt" "$PKG_DIR/" 2>/dev/null || true

          # Create zip
          cd dist
          zip -r "CroMagRally-${VERSION}-Windows-x86_64.zip" "CroMagRally-${VERSION}-Windows-x86_64"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{env.ARTIFACT_NAME}}
          path: dist/*.zip
          compression-level: 0

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 45
    continue-on-error: true  # macOS is optional for release
    steps:
      - uses: actions/checkout@v4
        with: {submodules: 'recursive'}

      - name: Restore prebuilt GNS from cache
        uses: actions/cache/restore@v4
        id: gns-cache
        with:
          path: gns-prebuilt
          key: gns-prebuilt-macos-arm64-${{ env.GNS_VERSION }}-${{ env.CACHE_VERSION }}

      - name: Verify prebuilt GNS cache
        if: steps.gns-cache.outputs.cache-hit != 'true'
        run: |
          echo "::error::Prebuilt GNS cache miss! Run PrebuildDeps.yml workflow manually."
          exit 1

      - name: Set up prebuilt GNS
        run: |
          echo "Using prebuilt GNS from cache"
          echo "CMAKE_PREFIX_PATH=${{ github.workspace }}/gns-prebuilt" >> $GITHUB_ENV
          echo "DYLD_LIBRARY_PATH=${{ github.workspace }}/gns-prebuilt/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Get artifact name
        run: echo "ARTIFACT_NAME=$(python3 build.py --print-artifact-name)" >> $GITHUB_ENV
      - run: python3 build.py --dependencies
      - run: python3 build.py --configure -G Xcode -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_PREFIX_PATH="${{ github.workspace }}/gns-prebuilt"
      - run: python3 build.py --build
      - run: python3 build.py --package
      - uses: actions/upload-artifact@v4
        with:
          name: ${{env.ARTIFACT_NAME}}
          path: dist/
          compression-level: 0

  release:
    needs: [build-linux-appimage, build-windows-mingw, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
