name: Make Release Builds

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-linux-appimage:
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 45
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache
    strategy:
      fail-fast: false
      matrix:
        platform:  # Use oldest available Ubuntu for maximum glibc compatibility
          - { name: x86_64, os: ubuntu-22.04 }
          - { name: aarch64, os: ubuntu-22.04-arm }
    steps:
      - uses: actions/checkout@v4
        with: {submodules: 'recursive'}
      - name: Create vcpkg binary cache directory
        run: mkdir -p ${{ github.workspace }}/vcpkg-cache
      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg-cache
          key: vcpkg-bin-linux-${{ matrix.platform.name }}-${{ hashFiles('.github/workflows/ReleaseBuilds.yml') }}
          restore-keys: vcpkg-bin-linux-${{ matrix.platform.name }}-
      - name: Get build dependencies from APT
        run: |
          sudo apt update
          sudo apt install -y libasound2-dev libpulse-dev \
            libaudio-dev libjack-dev libsndio-dev libx11-dev libxext-dev \
            libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev \
            libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev \
            libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev fcitx-libs-dev \
            libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev \
            desktop-file-utils
      - name: Install GNS via vcpkg
        run: |
          vcpkg install gamenetworkingsockets
          echo "CMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $GITHUB_ENV
      - run: echo "ARTIFACT_NAME=$(python3 build.py --print-artifact-name)" >> $GITHUB_ENV
      - run: python3 build.py --dependencies
      - run: python3 build.py --configure
      - run: python3 build.py --build
      - run: python3 build.py --package
      - uses: actions/upload-artifact@v4
        with:
          name: ${{env.ARTIFACT_NAME}}
          path: dist/
          compression-level: 0

  build-windows:
    runs-on: windows-2022
    timeout-minutes: 45
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache
    steps:
      - uses: actions/checkout@v4
        with: {submodules: 'recursive'}
      - name: Create vcpkg binary cache directory
        run: New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/vcpkg-cache"
      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg-cache
          key: vcpkg-bin-windows-x64-${{ hashFiles('.github/workflows/ReleaseBuilds.yml') }}
          restore-keys: vcpkg-bin-windows-x64-
      - name: Install GNS via vcpkg
        run: |
          vcpkg install gamenetworkingsockets:x64-windows
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV
      - run: |
          $ARTIFACT_NAME = python3 build.py --print-artifact-name
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $env:GITHUB_ENV
      - run: python3 build.py --dependencies
      - run: python3 build.py --configure -G 'Visual Studio 17 2022'
      - run: python3 build.py --build
      - run: python3 build.py --package
      - uses: actions/upload-artifact@v4
        with:
          name: ${{env.ARTIFACT_NAME}}
          path: dist/
          compression-level: 0

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 45
    continue-on-error: true  # macOS is optional for release
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache
    steps:
      - uses: actions/checkout@v4
        with: {submodules: 'recursive'}
      - name: Create vcpkg binary cache directory
        run: mkdir -p ${{ github.workspace }}/vcpkg-cache
      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg-cache
          key: vcpkg-bin-macos-arm64-${{ hashFiles('.github/workflows/ReleaseBuilds.yml') }}
          restore-keys: vcpkg-bin-macos-arm64-
      - name: Install GNS via vcpkg
        run: |
          vcpkg install gamenetworkingsockets
          echo "CMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $GITHUB_ENV
      - name: Get artifact name
        run: echo "ARTIFACT_NAME=$(python3 build.py --print-artifact-name)" >> $GITHUB_ENV
      - run: python3 build.py --dependencies
      - run: python3 build.py --configure -G Xcode -DCMAKE_OSX_ARCHITECTURES=arm64
      - run: python3 build.py --build
      - run: python3 build.py --package
      - uses: actions/upload-artifact@v4
        with:
          name: ${{env.ARTIFACT_NAME}}
          path: dist/
          compression-level: 0

  release:
    needs: [build-linux-appimage, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
