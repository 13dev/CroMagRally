name: Prebuild Dependencies

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:
    inputs:
      gns_version:
        description: 'GameNetworkingSockets version tag'
        default: 'v1.5.1'
      force_rebuild:
        description: 'Force rebuild even if cache exists'
        type: boolean
        default: false

env:
  GNS_VERSION: ${{ github.event.inputs.gns_version || 'v1.5.1' }}
  CACHE_VERSION: v4  # Increment to invalidate all caches

jobs:
  build-linux:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: linux-x64, os: ubuntu-22.04 }
          - { platform: linux-arm64, os: ubuntu-22.04-arm }
    steps:
      - name: Check existing cache
        if: ${{ !inputs.force_rebuild }}
        uses: actions/cache/restore@v4
        id: cache-check
        with:
          path: gns-prebuilt
          key: gns-prebuilt-${{ matrix.platform }}-${{ env.GNS_VERSION }}-${{ env.CACHE_VERSION }}
          lookup-only: true

      - name: Skip if cache exists
        if: steps.cache-check.outputs.cache-hit == 'true'
        run: echo "Cache hit - skipping build for ${{ matrix.platform }}"

      - name: Install build dependencies
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build \
            libssl-dev libprotobuf-dev protobuf-compiler

      - name: Clone GameNetworkingSockets
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.GNS_VERSION }} \
            https://github.com/ValveSoftware/GameNetworkingSockets.git gns-src

      - name: Build GameNetworkingSockets
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          cmake -S gns-src -B gns-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/gns-prebuilt \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF
          cmake --build gns-build --parallel
          cmake --install gns-build

      - name: Copy system dependencies
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          dest=${{ github.workspace }}/gns-prebuilt

          # Copy protobuf headers and libs
          cp -r /usr/include/google "$dest/include/"

          # Copy OpenSSL headers
          cp -r /usr/include/openssl "$dest/include/"

          # Copy all related .so files (protobuf, ssl, crypto, abseil, etc)
          for lib in protobuf ssl crypto absl utf8; do
            cp /usr/lib/*/lib${lib}*.so* "$dest/lib/" 2>/dev/null || \
            cp /usr/lib/lib${lib}*.so* "$dest/lib/" 2>/dev/null || true
          done

          echo "=== Headers ==="
          ls "$dest/include/"
          echo "=== Libraries ==="
          ls "$dest/lib/"

      - name: Verify installation
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          echo "=== Installed files ==="
          find gns-prebuilt -type f | head -50
          echo "=== Library files ==="
          ls -la gns-prebuilt/lib* 2>/dev/null || ls -la gns-prebuilt/lib/ 2>/dev/null || true

      - name: Save to cache
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: gns-prebuilt
          key: gns-prebuilt-${{ matrix.platform }}-${{ env.GNS_VERSION }}-${{ env.CACHE_VERSION }}

  build-mingw:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Check existing cache
        if: ${{ !inputs.force_rebuild }}
        uses: actions/cache/restore@v4
        id: cache-check
        with:
          path: gns-prebuilt
          key: gns-prebuilt-mingw-x64-${{ env.GNS_VERSION }}-${{ env.CACHE_VERSION }}
          lookup-only: true

      - name: Skip if cache exists
        if: steps.cache-check.outputs.cache-hit == 'true'
        run: echo "Cache hit - skipping build for mingw-x64"

      - name: Install MinGW and vcpkg dependencies
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 ninja-build protobuf-compiler curl zip unzip tar

          # Fix case-sensitivity: GNS uses "Iphlpapi" but MinGW has "iphlpapi"
          MINGW_LIB=$(find /usr -name "libiphlpapi.a" 2>/dev/null | head -1)
          if [ -n "$MINGW_LIB" ]; then
            MINGW_DIR=$(dirname "$MINGW_LIB")
            sudo ln -sf "$MINGW_LIB" "$MINGW_DIR/libIphlpapi.a"
          fi

      - name: Setup vcpkg
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.sh

      - name: Install MinGW dependencies via vcpkg
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          # Install OpenSSL and Protobuf for MinGW static linking
          ./vcpkg/vcpkg install openssl:x64-mingw-static protobuf:x64-mingw-static

      - name: Clone GameNetworkingSockets
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.GNS_VERSION }} \
            https://github.com/ValveSoftware/GameNetworkingSockets.git gns-src

      - name: Build GameNetworkingSockets for MinGW
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          VCPKG_INSTALLED="${{ github.workspace }}/vcpkg/installed/x64-mingw-static"

          cmake -S gns-src -B gns-build -G Ninja \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
            -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ \
            -DCMAKE_FIND_ROOT_PATH="$VCPKG_INSTALLED" \
            -DCMAKE_PREFIX_PATH="$VCPKG_INSTALLED" \
            -DOPENSSL_ROOT_DIR="$VCPKG_INSTALLED" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/gns-prebuilt \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF
          cmake --build gns-build --parallel
          cmake --install gns-build

      - name: Copy vcpkg dependencies
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          dest=${{ github.workspace }}/gns-prebuilt
          VCPKG_INSTALLED="${{ github.workspace }}/vcpkg/installed/x64-mingw-static"

          # Copy headers
          cp -r "$VCPKG_INSTALLED/include/"* "$dest/include/"

          # Copy static libraries
          cp "$VCPKG_INSTALLED/lib/"*.a "$dest/lib/" 2>/dev/null || true

          # Copy CMake configs
          mkdir -p "$dest/share"
          cp -r "$VCPKG_INSTALLED/share/"* "$dest/share/" 2>/dev/null || true

          echo "=== Headers ==="
          ls "$dest/include/"
          echo "=== Libraries ==="
          ls "$dest/lib/"
          echo "=== CMake configs ==="
          ls "$dest/share/" 2>/dev/null || echo "(none)"

      - name: Verify installation
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          echo "=== Installed files ==="
          find gns-prebuilt -type f | head -50
          echo "=== Library files ==="
          ls -la gns-prebuilt/lib/ 2>/dev/null || true

      - name: Save to cache
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: gns-prebuilt
          key: gns-prebuilt-mingw-x64-${{ env.GNS_VERSION }}-${{ env.CACHE_VERSION }}

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Check existing cache
        if: ${{ !inputs.force_rebuild }}
        uses: actions/cache/restore@v4
        id: cache-check
        with:
          path: gns-prebuilt
          key: gns-prebuilt-macos-arm64-${{ env.GNS_VERSION }}-${{ env.CACHE_VERSION }}
          lookup-only: true

      - name: Skip if cache exists
        if: steps.cache-check.outputs.cache-hit == 'true'
        run: echo "Cache hit - skipping build for macos-arm64"

      - name: Install dependencies via Homebrew
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          brew install cmake ninja protobuf openssl@3

      - name: Clone GameNetworkingSockets
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.GNS_VERSION }} \
            https://github.com/ValveSoftware/GameNetworkingSockets.git gns-src

      - name: Build GameNetworkingSockets
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          cmake -S gns-src -B gns-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/gns-prebuilt \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF
          cmake --build gns-build --parallel
          cmake --install gns-build

      - name: Copy Homebrew dependencies
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          dest=${{ github.workspace }}/gns-prebuilt

          # Copy protobuf headers and libs
          cp -r $(brew --prefix protobuf)/include/* "$dest/include/"
          cp $(brew --prefix protobuf)/lib/*.dylib "$dest/lib/"
          cp $(brew --prefix protobuf)/lib/*.a "$dest/lib/" 2>/dev/null || true

          # Copy OpenSSL headers and libs
          cp -r $(brew --prefix openssl@3)/include/* "$dest/include/"
          cp $(brew --prefix openssl@3)/lib/*.dylib "$dest/lib/"
          cp $(brew --prefix openssl@3)/lib/*.a "$dest/lib/" 2>/dev/null || true

          echo "=== Headers ==="
          ls "$dest/include/"
          echo "=== Libraries ==="
          ls "$dest/lib/"

      - name: Verify installation
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          echo "=== Installed files ==="
          find gns-prebuilt -type f | head -50
          echo "=== Library files ==="
          ls -la gns-prebuilt/lib/ 2>/dev/null || true

      - name: Save to cache
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: gns-prebuilt
          key: gns-prebuilt-macos-arm64-${{ env.GNS_VERSION }}-${{ env.CACHE_VERSION }}
