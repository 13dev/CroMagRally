name: Prebuild Dependencies

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:
    inputs:
      gns_version:
        description: 'GameNetworkingSockets version tag'
        default: 'v1.5.1'
      force_rebuild:
        description: 'Force rebuild even if cache exists'
        type: boolean
        default: false

env:
  GNS_VERSION: ${{ github.event.inputs.gns_version || 'v1.5.1' }}
  CACHE_VERSION: v4  # Increment to invalidate all caches

jobs:
  build-linux:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: linux-x64, os: ubuntu-22.04 }
          - { platform: linux-arm64, os: ubuntu-22.04-arm }
    steps:
      - name: Check existing cache
        if: ${{ !inputs.force_rebuild }}
        uses: actions/cache/restore@v4
        id: cache-check
        with:
          path: gns-prebuilt
          key: gns-prebuilt-${{ matrix.platform }}-${{ env.GNS_VERSION }}-${{ env.CACHE_VERSION }}
          lookup-only: true

      - name: Skip if cache exists
        if: steps.cache-check.outputs.cache-hit == 'true'
        run: echo "Cache hit - skipping build for ${{ matrix.platform }}"

      - name: Install build dependencies
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build \
            libssl-dev libprotobuf-dev protobuf-compiler

      - name: Clone GameNetworkingSockets
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.GNS_VERSION }} \
            https://github.com/ValveSoftware/GameNetworkingSockets.git gns-src

      - name: Build GameNetworkingSockets
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          cmake -S gns-src -B gns-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/gns-prebuilt \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF
          cmake --build gns-build --parallel
          cmake --install gns-build

      - name: Copy system dependencies
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          dest=${{ github.workspace }}/gns-prebuilt

          # Copy protobuf headers and libs
          cp -r /usr/include/google "$dest/include/"

          # Copy OpenSSL headers
          cp -r /usr/include/openssl "$dest/include/"

          # Copy all related .so files (protobuf, ssl, crypto, abseil, etc)
          for lib in protobuf ssl crypto absl utf8; do
            cp /usr/lib/*/lib${lib}*.so* "$dest/lib/" 2>/dev/null || \
            cp /usr/lib/lib${lib}*.so* "$dest/lib/" 2>/dev/null || true
          done

          echo "=== Headers ==="
          ls "$dest/include/"
          echo "=== Libraries ==="
          ls "$dest/lib/"

      - name: Verify installation
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          echo "=== Installed files ==="
          find gns-prebuilt -type f | head -50
          echo "=== Library files ==="
          ls -la gns-prebuilt/lib* 2>/dev/null || ls -la gns-prebuilt/lib/ 2>/dev/null || true

      - name: Save to cache
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: gns-prebuilt
          key: gns-prebuilt-${{ matrix.platform }}-${{ env.GNS_VERSION }}-${{ env.CACHE_VERSION }}

  build-windows:
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - name: Check existing cache
        if: ${{ !inputs.force_rebuild }}
        uses: actions/cache/restore@v4
        id: cache-check
        with:
          path: gns-prebuilt
          key: gns-prebuilt-windows-x64-${{ env.GNS_VERSION }}-${{ env.CACHE_VERSION }}
          lookup-only: true

      - name: Skip if cache exists
        if: steps.cache-check.outputs.cache-hit == 'true'
        run: echo "Cache hit - skipping build for windows-x64"

      - name: Install GameNetworkingSockets via vcpkg
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          vcpkg install gamenetworkingsockets:x64-windows

      - name: Copy from vcpkg
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          $dest = "${{ github.workspace }}/gns-prebuilt"
          $vcpkgDir = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows"

          # Copy entire vcpkg structure to preserve paths expected by CMake configs
          Copy-Item "$vcpkgDir\*" -Destination "$dest" -Recurse -Force -ErrorAction SilentlyContinue

          echo "=== Top-level directories ==="
          Get-ChildItem "$dest" -Directory -ErrorAction SilentlyContinue | ForEach-Object { $_.Name }
          echo "=== DLLs ==="
          Get-ChildItem "$dest/bin" -Filter *.dll -ErrorAction SilentlyContinue | ForEach-Object { $_.Name }
          echo "=== Release Libs ==="
          Get-ChildItem "$dest/lib" -Filter *.lib -ErrorAction SilentlyContinue | ForEach-Object { $_.Name }
          echo "=== Debug Libs ==="
          Get-ChildItem "$dest/debug/lib" -Filter *.lib -ErrorAction SilentlyContinue | ForEach-Object { $_.Name }
          echo "=== CMake configs (share/) ==="
          Get-ChildItem "$dest/share" -Directory -ErrorAction SilentlyContinue | ForEach-Object { $_.Name }

      - name: Verify transitive dependency configs
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          $dest = "${{ github.workspace }}/gns-prebuilt"

          # Required CMake config directories for GNS and its transitive dependencies
          $requiredConfigs = @(
            "gamenetworkingsockets",
            "protobuf",
            "openssl"
          )

          $missing = @()
          foreach ($pkg in $requiredConfigs) {
            $configDir = "$dest/share/$pkg"
            if (Test-Path $configDir) {
              Write-Host "✓ Found CMake config: $pkg"
              Get-ChildItem "$configDir" -Filter "*.cmake" | ForEach-Object { Write-Host "  - $($_.Name)" }
            } else {
              Write-Host "✗ MISSING CMake config: $pkg"
              $missing += $pkg
            }
          }

          # List all .cmake files for debugging
          echo ""
          echo "=== All .cmake files in cache ==="
          Get-ChildItem "$dest" -Recurse -Filter "*.cmake" | ForEach-Object { $_.FullName }

          if ($missing.Count -gt 0) {
            Write-Host ""
            Write-Host "::error::Missing CMake configs for: $($missing -join ', ')"
            Write-Host "These are required transitive dependencies for GameNetworkingSockets"
            exit 1
          }

      - name: Verify installation
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          echo "=== Installed files (first 100) ==="
          Get-ChildItem -Recurse gns-prebuilt | Select-Object -First 100 FullName

      - name: Save to cache
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: gns-prebuilt
          key: gns-prebuilt-windows-x64-${{ env.GNS_VERSION }}-${{ env.CACHE_VERSION }}

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Check existing cache
        if: ${{ !inputs.force_rebuild }}
        uses: actions/cache/restore@v4
        id: cache-check
        with:
          path: gns-prebuilt
          key: gns-prebuilt-macos-arm64-${{ env.GNS_VERSION }}-${{ env.CACHE_VERSION }}
          lookup-only: true

      - name: Skip if cache exists
        if: steps.cache-check.outputs.cache-hit == 'true'
        run: echo "Cache hit - skipping build for macos-arm64"

      - name: Install dependencies via Homebrew
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          brew install cmake ninja protobuf openssl@3

      - name: Clone GameNetworkingSockets
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.GNS_VERSION }} \
            https://github.com/ValveSoftware/GameNetworkingSockets.git gns-src

      - name: Build GameNetworkingSockets
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          cmake -S gns-src -B gns-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/gns-prebuilt \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF
          cmake --build gns-build --parallel
          cmake --install gns-build

      - name: Copy Homebrew dependencies
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          dest=${{ github.workspace }}/gns-prebuilt

          # Copy protobuf headers and libs
          cp -r $(brew --prefix protobuf)/include/* "$dest/include/"
          cp $(brew --prefix protobuf)/lib/*.dylib "$dest/lib/"
          cp $(brew --prefix protobuf)/lib/*.a "$dest/lib/" 2>/dev/null || true

          # Copy OpenSSL headers and libs
          cp -r $(brew --prefix openssl@3)/include/* "$dest/include/"
          cp $(brew --prefix openssl@3)/lib/*.dylib "$dest/lib/"
          cp $(brew --prefix openssl@3)/lib/*.a "$dest/lib/" 2>/dev/null || true

          echo "=== Headers ==="
          ls "$dest/include/"
          echo "=== Libraries ==="
          ls "$dest/lib/"

      - name: Verify installation
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          echo "=== Installed files ==="
          find gns-prebuilt -type f | head -50
          echo "=== Library files ==="
          ls -la gns-prebuilt/lib/ 2>/dev/null || true

      - name: Save to cache
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: gns-prebuilt
          key: gns-prebuilt-macos-arm64-${{ env.GNS_VERSION }}-${{ env.CACHE_VERSION }}
