name: Prebuild Dependencies

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:
    inputs:
      gns_version:
        description: 'GameNetworkingSockets version tag'
        default: 'v1.5.1'
      force_rebuild:
        description: 'Force rebuild even if cache exists'
        type: boolean
        default: false

env:
  GNS_VERSION: ${{ github.event.inputs.gns_version || 'v1.5.1' }}
  CACHE_VERSION: v1  # Increment to invalidate all caches

jobs:
  build-linux:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: linux-x64, os: ubuntu-22.04 }
          - { platform: linux-arm64, os: ubuntu-22.04-arm }
    steps:
      - name: Check existing cache
        if: ${{ !inputs.force_rebuild }}
        uses: actions/cache/restore@v4
        id: cache-check
        with:
          path: gns-prebuilt
          key: gns-prebuilt-${{ matrix.platform }}-${{ env.GNS_VERSION }}-${{ env.CACHE_VERSION }}
          lookup-only: true

      - name: Skip if cache exists
        if: steps.cache-check.outputs.cache-hit == 'true'
        run: echo "Cache hit - skipping build for ${{ matrix.platform }}"

      - name: Install build dependencies
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build \
            libssl-dev libprotobuf-dev protobuf-compiler

      - name: Clone GameNetworkingSockets
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.GNS_VERSION }} \
            https://github.com/ValveSoftware/GameNetworkingSockets.git gns-src

      - name: Build GameNetworkingSockets
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          cmake -S gns-src -B gns-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/gns-prebuilt \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF
          cmake --build gns-build --parallel
          cmake --install gns-build

      - name: Copy system dependencies
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          dest=${{ github.workspace }}/gns-prebuilt

          # Copy protobuf headers and libs
          cp -r /usr/include/google "$dest/include/"

          # Copy OpenSSL headers
          cp -r /usr/include/openssl "$dest/include/"

          # Copy all related .so files (protobuf, ssl, crypto, abseil, etc)
          for lib in protobuf ssl crypto absl utf8; do
            cp /usr/lib/*/lib${lib}*.so* "$dest/lib/" 2>/dev/null || \
            cp /usr/lib/lib${lib}*.so* "$dest/lib/" 2>/dev/null || true
          done

          echo "=== Headers ==="
          ls "$dest/include/"
          echo "=== Libraries ==="
          ls "$dest/lib/"

      - name: Verify installation
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          echo "=== Installed files ==="
          find gns-prebuilt -type f | head -50
          echo "=== Library files ==="
          ls -la gns-prebuilt/lib* 2>/dev/null || ls -la gns-prebuilt/lib/ 2>/dev/null || true

      - name: Save to cache
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: gns-prebuilt
          key: gns-prebuilt-${{ matrix.platform }}-${{ env.GNS_VERSION }}-${{ env.CACHE_VERSION }}

  build-windows:
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - name: Check existing cache
        if: ${{ !inputs.force_rebuild }}
        uses: actions/cache/restore@v4
        id: cache-check
        with:
          path: gns-prebuilt
          key: gns-prebuilt-windows-x64-${{ env.GNS_VERSION }}-${{ env.CACHE_VERSION }}
          lookup-only: true

      - name: Skip if cache exists
        if: steps.cache-check.outputs.cache-hit == 'true'
        run: echo "Cache hit - skipping build for windows-x64"

      - name: Clone and build Protobuf
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v25.1 --recursive https://github.com/protocolbuffers/protobuf.git protobuf-src
          cmake -S protobuf-src -B protobuf-build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/protobuf-install" `
            -DBUILD_SHARED_LIBS=OFF `
            -Dprotobuf_BUILD_TESTS=OFF `
            -Dprotobuf_ABSL_PROVIDER=module `
            -DABSL_PROPAGATE_CXX_STD=ON
          cmake --build protobuf-build --config Release --parallel
          cmake --install protobuf-build --config Release

      - name: Clone GameNetworkingSockets
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.GNS_VERSION }} `
            https://github.com/ValveSoftware/GameNetworkingSockets.git gns-src

      - name: Build GameNetworkingSockets
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          # OpenSSL is pre-installed on Windows runners
          $opensslDir = "C:\Program Files\OpenSSL"

          cmake -S gns-src -B gns-build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/gns-prebuilt" `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/protobuf-install" `
            -DOPENSSL_ROOT_DIR="$opensslDir" `
            -DBUILD_SHARED_LIBS=OFF `
            -DBUILD_TESTS=OFF `
            -DBUILD_EXAMPLES=OFF
          cmake --build gns-build --config Release --parallel
          cmake --install gns-build --config Release

      - name: Copy dependencies
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          $dest = "${{ github.workspace }}/gns-prebuilt"
          $opensslDir = "C:\Program Files\OpenSSL"
          $protobufDir = "${{ github.workspace }}/protobuf-install"

          # Copy OpenSSL (pre-installed on runner)
          Copy-Item "$opensslDir\bin\*.dll" -Destination "$dest/bin" -ErrorAction SilentlyContinue
          Copy-Item "$opensslDir\lib\VC\x64\MD\*.lib" -Destination "$dest/lib" -ErrorAction SilentlyContinue
          Copy-Item "$opensslDir\include\openssl" -Destination "$dest/include" -Recurse -Force -ErrorAction SilentlyContinue

          # Copy Protobuf (built from source)
          Copy-Item "$protobufDir\bin\*.dll" -Destination "$dest/bin" -ErrorAction SilentlyContinue
          Copy-Item "$protobufDir\bin\*.exe" -Destination "$dest/bin" -ErrorAction SilentlyContinue
          Copy-Item "$protobufDir\lib\*.lib" -Destination "$dest/lib" -ErrorAction SilentlyContinue
          Copy-Item "$protobufDir\include\*" -Destination "$dest/include" -Recurse -Force -ErrorAction SilentlyContinue

          echo "=== DLLs ==="
          Get-ChildItem "$dest/bin" -Filter *.dll -ErrorAction SilentlyContinue | ForEach-Object { $_.Name }
          echo "=== Import libs ==="
          Get-ChildItem "$dest/lib" -Filter *.lib -ErrorAction SilentlyContinue | ForEach-Object { $_.Name }
          echo "=== Include dirs ==="
          Get-ChildItem "$dest/include" -Directory -ErrorAction SilentlyContinue | ForEach-Object { $_.Name }

      - name: Verify installation
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          echo "=== Installed files ==="
          Get-ChildItem -Recurse gns-prebuilt | Select-Object -First 50 FullName

      - name: Save to cache
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: gns-prebuilt
          key: gns-prebuilt-windows-x64-${{ env.GNS_VERSION }}-${{ env.CACHE_VERSION }}

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Check existing cache
        if: ${{ !inputs.force_rebuild }}
        uses: actions/cache/restore@v4
        id: cache-check
        with:
          path: gns-prebuilt
          key: gns-prebuilt-macos-arm64-${{ env.GNS_VERSION }}-${{ env.CACHE_VERSION }}
          lookup-only: true

      - name: Skip if cache exists
        if: steps.cache-check.outputs.cache-hit == 'true'
        run: echo "Cache hit - skipping build for macos-arm64"

      - name: Install dependencies via Homebrew
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          brew install cmake ninja protobuf openssl@3

      - name: Clone GameNetworkingSockets
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.GNS_VERSION }} \
            https://github.com/ValveSoftware/GameNetworkingSockets.git gns-src

      - name: Build GameNetworkingSockets
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          cmake -S gns-src -B gns-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/gns-prebuilt \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF
          cmake --build gns-build --parallel
          cmake --install gns-build

      - name: Copy Homebrew dependencies
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          dest=${{ github.workspace }}/gns-prebuilt

          # Copy protobuf headers and libs
          cp -r $(brew --prefix protobuf)/include/* "$dest/include/"
          cp $(brew --prefix protobuf)/lib/*.dylib "$dest/lib/"
          cp $(brew --prefix protobuf)/lib/*.a "$dest/lib/" 2>/dev/null || true

          # Copy OpenSSL headers and libs
          cp -r $(brew --prefix openssl@3)/include/* "$dest/include/"
          cp $(brew --prefix openssl@3)/lib/*.dylib "$dest/lib/"
          cp $(brew --prefix openssl@3)/lib/*.a "$dest/lib/" 2>/dev/null || true

          echo "=== Headers ==="
          ls "$dest/include/"
          echo "=== Libraries ==="
          ls "$dest/lib/"

      - name: Verify installation
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          echo "=== Installed files ==="
          find gns-prebuilt -type f | head -50
          echo "=== Library files ==="
          ls -la gns-prebuilt/lib/ 2>/dev/null || true

      - name: Save to cache
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: gns-prebuilt
          key: gns-prebuilt-macos-arm64-${{ env.GNS_VERSION }}-${{ env.CACHE_VERSION }}
