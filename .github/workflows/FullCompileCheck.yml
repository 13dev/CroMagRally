name: Full Compile Check

on: [workflow_dispatch]

jobs:
  full-compile-check:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: Linux/GCC, os: ubuntu-latest }
          - { name: Linux/Clang, os: ubuntu-latest, cc: clang, cxx: clang++ }
          - { name: Mac, os: macos-latest }

    steps:
      - uses: actions/checkout@v4
        with: {submodules: 'recursive'}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y ninja-build libsdl3-dev libspdlog-dev libgl1-mesa-dev python3-pip
          pip install meson

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install meson ninja sdl3 spdlog

      - name: Install GNS from source
        run: |
          git clone --depth 1 --branch v1.5.1 https://github.com/ValveSoftware/GameNetworkingSockets.git
          cd GameNetworkingSockets
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_EXAMPLES=OFF -DBUILD_TESTS=OFF
          cmake --build . --parallel
          sudo cmake --install .
          sudo ldconfig || true

      - name: Configure
        env:
          CC: ${{ matrix.platform.cc || 'gcc' }}
          CXX: ${{ matrix.platform.cxx || 'g++' }}
        run: meson setup build-release -Dbuildtype=release

      - name: Build
        run: meson compile -C build-release
